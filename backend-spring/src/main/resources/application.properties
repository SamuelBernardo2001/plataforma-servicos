spring.application.name=Plataforma Servicos

# DATASOURCE
spring.datasource.url=jdbc:mysql://localhost:3307/plataforma_servicos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=samuel
spring.datasource.password=Cansado
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=filesystem:C:/Users/samue/Desktop/Projeto Estudos/BackEnd/plataforma-servicos-projeto/database/migrations
spring.flyway.baseline-on-migrate=true

# SERVER
server.port=8080

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SWAGGER / OPENAPI
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Caminho do Swagger UI — acesse http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# Caminho da documentação JSON — usado por ferramentas externas
springdoc.api-docs.path=/api-docs

# Ordena os endpoints por método HTTP (GET, POST, PUT, DELETE)
springdoc.swagger-ui.operations-sorter=method

# Ordena as tags (Controllers) alfabeticamente
springdoc.swagger-ui.tags-sorter=alpha

# Expande as operações automaticamente no Swagger UI
springdoc.swagger-ui.doc-expansion=none

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ACTUATOR
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Expõe apenas os endpoints essenciais
# health → status da aplicação e banco de dados
# info → informações do projeto
# metrics → métricas de performance
management.endpoints.web.exposure.include=health,info,metrics

# Mostra detalhes completos do health check
# Exibe status do banco, disco, etc.
management.endpoint.health.show-details=always

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# INFO DO PROJETO (exibido no /actuator/info)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
info.app.name=Plataforma de Serviços
info.app.description=Marketplace de serviços locais
info.app.version=1.0.0
info.app.java-version=21
info.app.spring-boot-version=3.2.3

# Habilita o preenchimento automático das informações de 'info.*' do properties
management.info.env.enabled=true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# LOGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Nivel geral de log
logging.level.root=INFO

# Logs do sistema em DEBUG para rastrear problemas
logging.level.com.plataforma.servicos=DEBUG

# Reduz verbosidade do Spring e Hibernate
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Pasta dos arquivos de log
logging.file.path=logs